<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date?</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card UI */
.card{
    width:350px;
    background:white;
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-size:24px;
    margin-bottom:20px;
}

.gif img{
    width:100%;
    border-radius:15px;
}

/* Buttons */
.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

button{
    flex:1;
    margin:5px;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#no{
    background:#eee;
}

button:hover{
    transform:scale(1.05);
}

/* Chat UI */
.chat{
    display:none;
    width:350px;
    height:600px;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    overflow:hidden;
    flex-direction:column;
}

.chat-header{
    padding:15px;
    border-bottom:1px solid #ddd;
    font-weight:600;
    background:#fafafa;
}

.chat-body{
    flex:1;
    padding:15px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
}

.message{
    background:#3797f0;
    color:white;
    padding:10px 15px;
    border-radius:18px;
    max-width:70%;
    align-self:flex-end;
    margin-top:10px;
}

.typing{
    font-size:14px;
    color:gray;
    margin-top:5px;
}

.seen{
    font-size:12px;
    color:gray;
    text-align:right;
}

/* Hidden */
.hidden{
    display:none;
}
</style>
</head>

<body>

<!-- Card -->
<div class="card" id="card">
    <h1>Will you go on a date with me? ❤️</h1>
    <div class="gif">
        <img src="https://media1.tenor.com/m/UAFrdZCt29YAAAAC/milk-and-mocha-waiting-for-reply.gif">
    </div>

    <div class="buttons">
        <button id="yes">Yes 😍</button>
        <button id="no">No 😏</button>
    </div>
</div>

<!-- Chat -->
<div class="chat" id="chat">
    <div class="chat-header">divyanshhh._1</div>
    <div class="chat-body" id="chatBody"></div>
</div>

<script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");
const card = document.getElementById("card");
const chat = document.getElementById("chat");
const chatBody = document.getElementById("chatBody");

/* Yes click */
yes.onclick = () => {
    card.classList.add("hidden");
    chat.style.display = "flex";
    showTyping();
};

/* No button move */
no.onclick = () => {
    no.style.position = "absolute";
    no.style.left = Math.random()*200 + "px";
    no.style.top = Math.random()*200 + "px";
};

/* Typing effect */
function showTyping(){
    let typing = document.createElement("div");
    typing.className = "typing";
    typing.innerText = "Typing...";
    chatBody.appendChild(typing);

    setTimeout(()=>{
        typing.remove();
        sendMessage();
    },1500);
}

function sendMessage(){
    let msg = document.createElement("div");
    msg.className = "message";
    chatBody.appendChild(msg);

    let text = "Chalo Date prr chalein!! 😍";
    let i = 0;

    function type(){
        if(i < text.length){
            msg.innerHTML += text.charAt(i);
            i++;
            setTimeout(type,40);
        } else {
            let seen = document.createElement("div");
            seen.className = "seen";
            seen.innerText = "Seen ✔✔";
            chatBody.appendChild(seen);
        }
    }
    type();
}
</script>

</body>
</html>
