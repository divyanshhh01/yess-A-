<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date?</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bellota+Text:ital,wght@1,300&family=Poppins:wght@400;700&family=Roboto:wght@400;700&display=swap');

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Bellota Text', sans-serif;
        }

        body, html{
            width: 100%;
            height: 100vh;
            background-image: url("https://img.freepik.com/free-vector/cloud-background-vector-cute-desktop-wallpaper_53876-136885.jpg");
            background-size: cover;
        }

        .container{
            width: 400px;
            height: 500px;
            position: absolute;
            left: 50%;
            top: 40%;
            transform: translate(-50%,-50%);
            text-align: center;
        }

        .container h1{
            margin-bottom: 20px;
            margin-top: 50px;
            font-size: 50px;
            font-weight: 700;
            text-shadow: 0px 3px 6px rgb(147, 77, 77);
        }

        .gif{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
        }

        .gifimg{
            border-radius: 10px;
            width: 384px;
            height: 254px;
            background-image: url("https://media1.tenor.com/m/UAFrdZCt29YAAAAC/milk-and-mocha-waiting-for-reply.gif");
            background-size: cover;
        }

        .answer-box{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            margin-top: 10px;
        }

        .answer{
            border: 1px solid black;
            width: 100px;
            height: 50px;
            font-size: 25px;
            border-radius: 10px;
            background: none;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .answer:hover{
            box-shadow: inset 0px 3px 6px rgba(0, 0, 0, 0.4);
        }

        .confirmation{
            display: none;
            width: 400px;
            height: 500px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            text-align: center;
        }

        .confirmation h1{
            font-size: 45px;
            text-shadow: 0px 3px 6px rgb(147, 77, 77);
        }

        .fix-gif{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .fix-gifimg{
            border-radius: 10px;
            width: 350px;
            height: 200px;
            background-image: url("https://media1.tenor.com/m/2VprHA868S8AAAAC/yummy-desserts-desserts-milk-mocha.gif");
            background-size: cover;
        }

        #fix{
            margin-top: 20px;
            width: 300px;
            height: 50px;
            font-size: 25px;
            border-radius: 10px;
            border: 1px solid black;
            background: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Will you go on a date with me?</h1>

    <div class="gif">
        <div class="gifimg"></div>
    </div>

    <div class="answer-box">
        <button class="answer" id="yes">Yes!!!</button>
        <button class="answer" id="no">No</button>
    </div>
</div>

<div class="confirmation">
    <h1>Yayyyyyyyy!!! Finally 😍</h1>

    <div class="fix-gif">
        <div class="fix-gifimg"></div>
    </div>

    <button class="answer" id="fix">Let's Fix a date</button>
</div>

<script>
const yes = document.querySelector("#yes");
const no = document.querySelector("#no");
const confirmation = document.querySelector(".confirmation");
const container = document.querySelector(".container");

yes.onclick = () => {
    container.style.display = "none";
    confirmation.style.display = "block";
};

no.onclick = () => {
    no.style.position = "absolute";

    let x = Math.random() * (container.clientWidth - no.clientWidth);
    let y = Math.random() * (container.clientHeight - no.clientHeight);

    no.style.left = x + "px";
    no.style.top = y + "px";
};

// 🔥 Updated Instagram link
document.getElementById("fix").onclick = () => {
    window.open("https://www.instagram.com/_aryann_039/", "_blank");
};
</script>

</body>
</html>
