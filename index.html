<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date?</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container, .confirmation{
    width: 350px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    position: absolute;
}

.confirmation{
    display: none;
}

h1{
    font-size: 24px;
    margin-bottom: 20px;
}

.gifimg, .fix-gifimg{
    width: 100%;
    height: 200px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
}

.gifimg{
    background-image: url("https://media1.tenor.com/m/UAFrdZCt29YAAAAC/milk-and-mocha-waiting-for-reply.gif");
}

.fix-gifimg{
    background-image: url("https://media1.tenor.com/m/2VprHA868S8AAAAC/yummy-desserts-desserts-milk-mocha.gif");
}

.answer-box{
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.answer{
    flex: 1;
    margin: 5px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

#yes{
    background: #ff4d6d;
    color: white;
}

#no{
    background: #eee;
}

#fix{
    margin-top: 15px;
    width: 100%;
    background: #ff4d6d;
    color: white;
}

.answer:hover{
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h1>Will you go on a date with me? ❤️</h1>

    <div class="gif">
        <div class="gifimg"></div>
    </div>

    <div class="answer-box">
        <button class="answer" id="yes">Yes 😍</button>
        <button class="answer" id="no">No 😏</button>
    </div>
</div>

<div class="confirmation">
    <h1>Yayyyyyyyy!!! 😍</h1>

    <div class="fix-gif">
        <div class="fix-gifimg"></div>
    </div>

    <button class="answer" id="fix">Let's Fix a date</button>
</div>

<script>
const yes = document.querySelector("#yes");
const no = document.querySelector("#no");
const confirmation = document.querySelector(".confirmation");
const container = document.querySelector(".container");

yes.onclick = () => {
    container.style.display = "none";
    confirmation.style.display = "block";
};

no.onclick = () => {
    no.style.position = "absolute";

    let x = Math.random() * (window.innerWidth - no.clientWidth);
    let y = Math.random() * (window.innerHeight - no.clientHeight);

    no.style.left = x + "px";
    no.style.top = y + "px";
};

// 🔥 Instagram redirect (FINAL)
document.getElementById("fix").onclick = () => {
    window.location.href = "https://www.instagram.com/divyanshhh._1/";
};
</script>

</body>
</html>
